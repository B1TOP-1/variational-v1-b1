<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Variational 价差走势</title>
  <style>
    :root { color-scheme: light; font-family: Inter, "Segoe UI", system-ui, sans-serif; color: #17202a; background: #eef1f4; }
    * { box-sizing: border-box; }
    body { margin: 0; min-width: 320px; overflow-x: hidden; letter-spacing: 0; }
    header { min-height: 58px; padding: 10px 22px; display: flex; align-items: center; justify-content: space-between; gap: 18px; background: #17202a; color: white; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .mark { width: 27px; height: 27px; display: grid; place-items: center; border: 1px solid #4c9af8; border-radius: 5px; color: #4c9af8; font-size: 12px; font-weight: 800; }
    h1 { margin: 0; font-size: 15px; }
    .status { display: flex; align-items: center; gap: 7px; color: #b8c1ca; font-size: 11px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #75808b; }
    .dot.live { background: #38b76a; box-shadow: 0 0 0 3px rgb(56 183 106 / 18%); }
    main { min-width: 0; min-height: calc(100vh - 58px); }
    .toolbar { padding: 14px 22px; display: flex; flex-wrap: wrap; align-items: end; gap: 14px; border-bottom: 1px solid #d5dce2; background: #f8fafb; }
    label { display: block; margin-bottom: 4px; color: #6b7681; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    select { width: 150px; height: 34px; padding: 0 9px; border: 1px solid #c6ced5; border-radius: 4px; background: white; color: #17202a; font-weight: 650; }
    .ranges, .series-modes { display: grid; gap: 2px; padding: 2px; border: 1px solid #c6ced5; border-radius: 5px; background: #e2e7eb; }
    .ranges { grid-template-columns: repeat(4, minmax(58px, 1fr)); }
    .series-modes { grid-template-columns: repeat(3, minmax(58px, 1fr)); }
    button { height: 29px; padding: 0 12px; border: 0; border-radius: 3px; background: transparent; color: #56616c; font-weight: 700; cursor: pointer; }
    button.active { background: white; color: #17202a; box-shadow: 0 1px 2px rgb(23 32 42 / 12%); }
    .summary { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); border-bottom: 1px solid #d5dce2; background: white; overflow: hidden; }
    .metric { min-width: 0; padding: 13px 18px; }
    .metric + .metric { border-left: 1px solid #e1e6ea; }
    .metric span { display: block; color: #75808b; font-size: 10px; font-weight: 700; text-transform: uppercase; }
    .metric strong { display: block; margin-top: 4px; font: 700 14px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace; overflow-wrap: anywhere; }
    .long { color: #2589c9; } .short { color: #8257d9; }
    .chart-section { padding: 18px 22px 24px; }
    .chart-head { display: flex; flex-wrap: wrap; align-items: baseline; justify-content: space-between; gap: 10px 12px; margin-bottom: 10px; }
    .chart-head-right { min-width: 0; display: flex; flex-wrap: wrap; align-items: center; justify-content: flex-end; gap: 8px 10px; }
    .chart-tools { display: flex; gap: 2px; padding: 2px; border: 1px solid #c6ced5; border-radius: 4px; background: #e2e7eb; }
    .chart-tools button { width: 30px; height: 26px; padding: 0; background: white; color: #33404c; font-size: 16px; }
    h2 { margin: 0; font-size: 14px; }
    .chart-meta { color: #75808b; font-size: 11px; overflow-wrap: anywhere; }
    .view-extrema { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); margin-bottom: 8px; border: 1px solid #d5dce2; background: #f8fafb; }
    .extrema-metric { min-width: 0; padding: 8px 12px; }
    .extrema-metric + .extrema-metric { border-left: 1px solid #e1e6ea; }
    .extrema-metric span { display: block; color: #75808b; font-size: 9px; font-weight: 700; }
    .extrema-metric strong { display: block; margin-top: 2px; font: 700 12px/1.35 ui-monospace, SFMono-Regular, Menlo, monospace; }
    .canvas-wrap { position: relative; width: 100%; height: clamp(340px, calc(100vh - 350px), 680px); border: 1px solid #d5dce2; background: white; cursor: grab; user-select: none; overflow: hidden; }
    .canvas-wrap.dragging { cursor: grabbing; }
    canvas { display: block; width: 100%; height: 100%; }
    .tooltip { position: absolute; display: none; min-width: 176px; padding: 8px 10px; border: 1px solid #bbc5ce; border-radius: 4px; background: rgb(255 255 255 / 96%); box-shadow: 0 4px 16px rgb(23 32 42 / 12%); pointer-events: none; font-size: 11px; line-height: 1.55; }
    .legend { display: flex; gap: 20px; margin-top: 10px; color: #56616c; font-size: 11px; }
    .legend .muted { opacity: 0.3; }
    .legend span::before { content: ""; display: inline-block; width: 18px; height: 3px; margin-right: 6px; vertical-align: middle; }
    .legend .long-key::before { background: #2589c9; } .legend .short-key::before { background: #8257d9; }
    .empty { position: absolute; inset: 0; display: grid; place-items: center; color: #75808b; font-size: 13px; }
    .daily-section { margin-top: 20px; border-top: 1px solid #cbd3da; }
    .daily-section h2 { padding: 14px 0 10px; }
    .daily-grid { border-top: 1px solid #d5dce2; }
    .daily-row { display: grid; grid-template-columns: minmax(100px, .8fr) repeat(4, minmax(110px, 1fr)); border-bottom: 1px solid #d5dce2; background: white; }
    .daily-cell { min-width: 0; padding: 8px 10px; font: 650 11px/1.4 ui-monospace, SFMono-Regular, Menlo, monospace; overflow-wrap: anywhere; }
    .daily-cell + .daily-cell { border-left: 1px solid #e5e9ed; }
    .daily-cell small { display: block; margin-bottom: 2px; color: #75808b; font: 700 9px/1.2 Inter, "Segoe UI", system-ui, sans-serif; }
    .daily-day { font-family: Inter, "Segoe UI", system-ui, sans-serif; }
    .daily-day strong { display: block; }
    .daily-day span { color: #75808b; font-size: 9px; }
    @media (max-width: 1180px) { .summary { grid-template-columns: repeat(3, minmax(0, 1fr)); } .metric:nth-child(4) { border-left: 0; } }
    @media (max-width: 720px) { header, .toolbar, .chart-section { padding-left: 12px; padding-right: 12px; } .toolbar { align-items: stretch; flex-direction: column; } select { width: 100%; } .summary, .view-extrema { grid-template-columns: repeat(2, minmax(0, 1fr)); } .metric:nth-child(odd), .extrema-metric:nth-child(odd) { border-left: 0; } .metric:nth-child(4) { border-left: 1px solid #e1e6ea; } .extrema-metric:nth-child(n + 3) { border-top: 1px solid #e1e6ea; } .chart-head-right { width: 100%; justify-content: space-between; } .canvas-wrap { height: 400px; } .daily-row { grid-template-columns: repeat(2, minmax(0, 1fr)); } .daily-day { grid-column: 1 / -1; border-bottom: 1px solid #e5e9ed; } .daily-cell:nth-child(2), .daily-cell:nth-child(4) { border-left: 0; } .daily-cell:nth-child(n + 4) { border-top: 1px solid #e5e9ed; } }
  </style>
</head>
<body>
  <header><div class="brand"><div class="mark">V</div><h1>Variational 价差走势</h1></div><div class="status"><span id="statusDot" class="dot"></span><span id="statusText">正在连接</span></div></header>
  <main>
    <section class="toolbar">
      <div><label for="assetSelect">交易标的</label><select id="assetSelect"><option value="">等待数据</option></select></div>
      <div><label>时间范围</label><div class="ranges"><button data-range="3600">1小时</button><button data-range="21600">6小时</button><button data-range="86400" class="active">24小时</button><button data-range="604800">7天</button></div></div>
      <div><label>显示曲线</label><div class="series-modes"><button data-series="both" class="active">双线</button><button data-series="long">做多</button><button data-series="short">做空</button></div></div>
    </section>
    <section class="summary">
      <div class="metric"><span>最新 Long Edge</span><strong id="longEdge" class="long">--</strong></div>
      <div class="metric"><span>最新 Short Edge</span><strong id="shortEdge" class="short">--</strong></div>
      <div class="metric"><span>Var Bid / Ask</span><strong id="varQuote">--</strong></div>
      <div class="metric"><span>Lighter VWAP</span><strong id="lighterQuote">--</strong></div>
      <div class="metric"><span>5分钟中位</span><strong id="median5m">--</strong></div>
      <div class="metric"><span>原始样本</span><strong id="sampleCount">0</strong></div>
    </section>
    <section class="chart-section">
      <div class="chart-head"><h2 id="chartTitle">价差历史（UTC+8）</h2><div class="chart-head-right"><span id="chartMeta" class="chart-meta">--</span><div class="chart-tools"><button id="zoomOut" type="button" title="缩小">−</button><button id="resetZoom" type="button" title="返回实时窗口">↔</button><button id="zoomIn" type="button" title="放大">+</button></div></div></div>
      <div class="view-extrema"><div class="extrema-metric"><span>当前窗口 LONG 最低</span><strong id="viewLongMin" class="long">--</strong></div><div class="extrema-metric"><span>当前窗口 LONG 最高</span><strong id="viewLongMax" class="long">--</strong></div><div class="extrema-metric"><span>当前窗口 SHORT 最低</span><strong id="viewShortMin" class="short">--</strong></div><div class="extrema-metric"><span>当前窗口 SHORT 最高</span><strong id="viewShortMax" class="short">--</strong></div></div>
      <div id="canvasWrap" class="canvas-wrap"><canvas id="chart"></canvas><div id="tooltip" class="tooltip"></div><div id="empty" class="empty">运行 main 后开始记录价差</div></div>
      <div class="legend"><span id="legendLong" class="long-key">做多价差（Long Edge）</span><span id="legendShort" class="short-key">做空价差（Short Edge）</span></div>
      <section class="daily-section"><h2>最近 7 日高低点（原始样本）</h2><div id="dailyExtrema" class="daily-grid"></div></section>
    </section>
  </main>
  <script>
    const $ = (id) => document.getElementById(id);
    let rangeSeconds = 86400, viewDurationMs = rangeSeconds * 1000, seriesMode = "both", payload = null, hoverPoints = [];
    let chartGeometry = null, dragging = null, hover = null, windowEndMs = null, refreshSequence = 0;
    const MIN_VIEW_MS = 10000, MAX_VIEW_MS = 7 * 24 * 3600 * 1000;
    const TIME_ZONE = "Asia/Shanghai";
    const dateTime = (timestamp) => new Intl.DateTimeFormat("zh-CN", { timeZone: TIME_ZONE, year: "numeric", month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit", second: "2-digit", hourCycle: "h23" }).format(new Date(timestamp));
    const edge = (v) => Number.isFinite(Number(v)) ? `${Number(v) >= 0 ? "+" : ""}${Number(v).toFixed(4)}%` : "--";
    const price = (v) => Number.isFinite(Number(v)) ? Number(v).toLocaleString("en-US", { maximumFractionDigits: 4 }) : "--";

    async function loadAssets() {
      const result = await fetch("/api/assets", { cache: "no-store" }).then((r) => r.json());
      const current = $("assetSelect").value;
      $("assetSelect").innerHTML = result.assets.length
        ? result.assets.map((asset) => `<option>${asset}</option>`).join("")
        : '<option value="">等待数据</option>';
      if (current && result.assets.includes(current)) $("assetSelect").value = current;
    }
    async function refresh() {
      const asset = $("assetSelect").value;
      if (!asset) { setStatus(false, "等待行情"); draw(); return; }
      try {
        const requestSequence = ++refreshSequence;
        const endParam = windowEndMs == null ? "" : `&end=${Math.round(windowEndMs)}`;
        const nextPayload = await fetch(`/api/history?asset=${encodeURIComponent(asset)}&range=${viewDurationMs / 1000}&points=1400${endParam}`, { cache: "no-store" }).then((r) => r.json());
        if (requestSequence !== refreshSequence) return;
        payload = nextPayload;
        renderSummary(); draw(); setStatus(true, windowEndMs == null ? "实时更新" : "历史浏览");
      } catch (error) { setStatus(false, "连接中断"); }
    }
    function setStatus(live, text) { $("statusDot").classList.toggle("live", live); $("statusText").textContent = text; }
    function renderSummary() {
      const latest = payload?.latest || {};
      $("longEdge").textContent = edge(latest.longEdge); $("shortEdge").textContent = edge(latest.shortEdge);
      $("varQuote").textContent = `${price(latest.varBid)} / ${price(latest.varAsk)}`;
      $("lighterQuote").textContent = `${price(latest.lighterBid)} / ${price(latest.lighterAsk)}`;
      $("median5m").textContent = `${edge(payload?.stats?.["5m"]?.long?.median)} / ${edge(payload?.stats?.["5m"]?.short?.median)}`;
      $("sampleCount").textContent = Number(payload?.sampleCount || 0).toLocaleString();
      $("chartTitle").textContent = `${payload.asset} Long / Short Edge（UTC+8）`;
      const start = payload?.windowStartMs, end = payload?.windowEndMs;
      $("chartMeta").textContent = start && end ? `${dateTime(start)} — ${dateTime(end)}` : "--";
      const extrema = payload?.viewExtrema || {};
      $("viewLongMin").textContent = edge(extrema.long?.min); $("viewLongMax").textContent = edge(extrema.long?.max);
      $("viewShortMin").textContent = edge(extrema.short?.min); $("viewShortMax").textContent = edge(extrema.short?.max);
      renderDailyExtrema();
    }
    function renderDailyExtrema() {
      const rows = payload?.dailyExtrema || [];
      const today = new Intl.DateTimeFormat("en-CA", { timeZone: TIME_ZONE, year: "numeric", month: "2-digit", day: "2-digit" }).format(new Date());
      $("dailyExtrema").innerHTML = rows.length ? rows.map((row) => `<div class="daily-row"><div class="daily-cell daily-day"><strong>${row.day}</strong><span>${row.day === today ? "今天" : "历史"}</span></div><div class="daily-cell long"><small>LONG 最低</small>${edge(row.long?.min)}</div><div class="daily-cell long"><small>LONG 最高</small>${edge(row.long?.max)}</div><div class="daily-cell short"><small>SHORT 最低</small>${edge(row.short?.min)}</div><div class="daily-cell short"><small>SHORT 最高</small>${edge(row.short?.max)}</div></div>`).join("") : '<div class="daily-cell">暂无历史</div>';
    }
    function draw() {
      const canvas = $("chart"), wrap = $("canvasWrap"), dpr = window.devicePixelRatio || 1;
      const rect = wrap.getBoundingClientRect(); canvas.width = Math.max(1, Math.round(rect.width * dpr)); canvas.height = Math.max(1, Math.round(rect.height * dpr));
      const ctx = canvas.getContext("2d"); ctx.scale(dpr, dpr); const width = rect.width, height = rect.height;
      ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, width, height);
      const allPoints = payload?.points || []; $("empty").style.display = allPoints.length ? "none" : "grid"; hoverPoints = [];
      if (!allPoints.length) return;
      const dataStart = allPoints[0].timestampMs, dataEnd = allPoints.at(-1).timestampMs;
      const viewStart = payload?.windowStartMs ?? dataStart, viewEnd = payload?.windowEndMs ?? dataEnd;
      const points = allPoints.filter((point) => point.timestampMs >= viewStart && point.timestampMs <= viewEnd);
      if (!points.length) return;
      const values = points.flatMap((point) => {
        if (seriesMode === "long") return [Number(point.longEdge)];
        if (seriesMode === "short") return [Number(point.shortEdge)];
        return [Number(point.longEdge), Number(point.shortEdge)];
      }).filter(Number.isFinite);
      const visibleExtrema = payload?.viewExtrema || {};
      if (seriesMode !== "short") values.push(Number(visibleExtrema.long?.min), Number(visibleExtrema.long?.max));
      if (seriesMode !== "long") values.push(Number(visibleExtrema.short?.min), Number(visibleExtrema.short?.max));
      const finiteValues = values.filter(Number.isFinite);
      let lo = Math.min(...finiteValues), hi = Math.max(...finiteValues), pad = Math.max((hi - lo) * .12, 0.00015); lo -= pad; hi += pad;
      const magnitude = Math.max(Math.abs(lo), Math.abs(hi));
      const decimals = magnitude < 0.001 ? 5 : magnitude < 0.01 ? 4 : magnitude < 0.1 ? 3 : 2;
      const area = { l: 82, r: width - 24, t: 18, b: height - 48 }, first = viewStart, last = viewEnd, span = Math.max(1, last - first);
      const x = (t) => area.l + (t - first) / span * (area.r - area.l), y = (v) => area.b - (v - lo) / (hi - lo) * (area.b - area.t);
      const edgeAtY = (py) => hi - (py - area.t) / (area.b - area.t) * (hi - lo);
      chartGeometry = { area, first, last, dataStart, dataEnd, x, y, edgeAtY };
      ctx.font = "11px system-ui"; ctx.fillStyle = "#6b7681"; ctx.strokeStyle = "#e5e9ed"; ctx.lineWidth = 1;
      for (let i = 0; i <= 6; i++) { const v = hi - (hi - lo) * i / 6, py = area.t + (area.b - area.t) * i / 6; ctx.beginPath(); ctx.moveTo(area.l, py); ctx.lineTo(area.r, py); ctx.stroke(); ctx.fillText(`${v >= 0 ? "+" : ""}${v.toFixed(decimals)}%`, 8, py + 4); }
      const tickCount = Math.max(3, Math.min(8, Math.floor((area.r - area.l) / 140)));
      const timeLabel = (timestamp) => { const options = span <= 2 * 3600e3 ? { hour: "2-digit", minute: "2-digit", second: "2-digit" } : span <= 86400e3 ? { hour: "2-digit", minute: "2-digit" } : { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" }; return new Intl.DateTimeFormat("zh-CN", { ...options, timeZone: TIME_ZONE, hourCycle: "h23" }).format(new Date(timestamp)); };
      for (let i = 0; i <= tickCount; i++) { const timestamp = first + span * i / tickCount, px = x(timestamp), label = timeLabel(timestamp); ctx.strokeStyle = "#eef1f3"; ctx.beginPath(); ctx.moveTo(px, area.t); ctx.lineTo(px, area.b); ctx.stroke(); ctx.fillStyle = "#6b7681"; ctx.fillText(label, Math.max(area.l, Math.min(area.r - ctx.measureText(label).width, px - ctx.measureText(label).width / 2)), height - 18); }
      if (lo <= 0 && hi >= 0) { ctx.strokeStyle = "#9ba5ae"; ctx.beginPath(); ctx.moveTo(area.l, y(0)); ctx.lineTo(area.r, y(0)); ctx.stroke(); }
      const line = (key, color) => { const coordinates = points.map((point) => ({ point, value: Number(point[key]) })).filter((row) => Number.isFinite(row.value)).map((row) => ({ point: row.point, x: x(row.point.timestampMs), y: y(row.value) })); if (!coordinates.length) return; coordinates.forEach((row) => hoverPoints.push({ x: row.x, point: row.point })); ctx.strokeStyle = color; ctx.lineWidth = 1.8; ctx.lineJoin = "round"; ctx.lineCap = "round"; ctx.beginPath(); ctx.moveTo(coordinates[0].x, coordinates[0].y); for (let index = 1; index < coordinates.length - 1; index++) { const current = coordinates[index], next = coordinates[index + 1]; ctx.quadraticCurveTo(current.x, current.y, (current.x + next.x) / 2, (current.y + next.y) / 2); } if (coordinates.length > 1) ctx.lineTo(coordinates.at(-1).x, coordinates.at(-1).y); ctx.stroke(); };
      if (seriesMode !== "short") line("longEdge", "#2589c9");
      if (seriesMode !== "long") line("shortEdge", "#8257d9");
      drawExtrema(ctx, x, y, area);
      if (hover && hover.x >= area.l && hover.x <= area.r && hover.y >= area.t && hover.y <= area.b) {
        const hoverEdge = edgeAtY(hover.y), label = edge(hoverEdge);
        ctx.save();
        ctx.setLineDash([5, 4]); ctx.strokeStyle = "#51606d"; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(area.l, hover.y); ctx.lineTo(area.r, hover.y); ctx.stroke();
        ctx.setLineDash([]); ctx.font = "700 11px ui-monospace, monospace";
        const labelWidth = Math.max(64, ctx.measureText(label).width + 12);
        ctx.fillStyle = "#33404c"; ctx.fillRect(area.l - labelWidth - 4, hover.y - 10, labelWidth, 20);
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.fillText(label, area.l - labelWidth / 2 - 4, hover.y + 4);
        ctx.restore();
      }
    }
    function drawExtrema(ctx, x, y, area) {
      const extrema = payload?.viewExtrema || {};
      const entries = [];
      if (seriesMode !== "short") entries.push([extrema.long?.minTimestampMs, extrema.long?.min, "多低", "#2589c9"], [extrema.long?.maxTimestampMs, extrema.long?.max, "多高", "#2589c9"]);
      if (seriesMode !== "long") entries.push([extrema.short?.minTimestampMs, extrema.short?.min, "空低", "#8257d9"], [extrema.short?.maxTimestampMs, extrema.short?.max, "空高", "#8257d9"]);
      ctx.save(); ctx.font = "700 10px system-ui";
      entries.forEach(([timestamp, value, name, color], index) => {
        if (!Number.isFinite(Number(timestamp)) || !Number.isFinite(Number(value))) return;
        const px = x(Number(timestamp)), py = y(Number(value));
        if (px < area.l || px > area.r || py < area.t || py > area.b) return;
        ctx.fillStyle = "#fff"; ctx.beginPath(); ctx.arc(px, py, 4.5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.stroke();
        const label = `${name} ${edge(value)}`, width = ctx.measureText(label).width + 10;
        const left = Math.max(area.l, Math.min(area.r - width, px - width / 2));
        const top = Math.max(area.t, Math.min(area.b - 18, py + (index % 2 === 0 ? 7 : -25)));
        ctx.fillStyle = color; ctx.fillRect(left, top, width, 18);
        ctx.fillStyle = "#fff"; ctx.textAlign = "center"; ctx.fillText(label, left + width / 2, top + 12.5);
      });
      ctx.restore();
    }
    function syncRangeButtons() {
      document.querySelectorAll("[data-range]").forEach((button) => {
        button.classList.toggle("active", windowEndMs == null && Math.abs(Number(button.dataset.range) * 1000 - viewDurationMs) < 1);
      });
    }
    async function zoom(factor, anchorRatio = 0.5) {
      if (!chartGeometry) return;
      const end = windowEndMs ?? payload?.windowEndMs ?? Date.now(), duration = viewDurationMs, start = end - duration;
      const nextDuration = Math.max(MIN_VIEW_MS, Math.min(MAX_VIEW_MS, duration * factor));
      const anchor = start + duration * anchorRatio;
      let nextStart = anchor - nextDuration * anchorRatio, nextEnd = nextStart + nextDuration;
      const now = Date.now();
      if (nextEnd > now) { nextStart -= nextEnd - now; nextEnd = now; }
      viewDurationMs = nextDuration;
      windowEndMs = nextEnd >= now - 2000 ? null : nextEnd;
      hover = null; $("tooltip").style.display = "none"; syncRangeButtons();
      await refresh();
    }
    function resetViewport() { viewDurationMs = rangeSeconds * 1000; windowEndMs = null; hover = null; syncRangeButtons(); refresh(); }
    $("assetSelect").addEventListener("change", () => { windowEndMs = null; hover = null; refresh(); });
    document.querySelectorAll("[data-range]").forEach((button) => button.addEventListener("click", () => { rangeSeconds = Number(button.dataset.range); viewDurationMs = rangeSeconds * 1000; windowEndMs = null; hover = null; syncRangeButtons(); refresh(); }));
    document.querySelectorAll("[data-series]").forEach((button) => button.addEventListener("click", () => { seriesMode = button.dataset.series; document.querySelectorAll("[data-series]").forEach((candidate) => candidate.classList.toggle("active", candidate === button)); $("legendLong").classList.toggle("muted", seriesMode === "short"); $("legendShort").classList.toggle("muted", seriesMode === "long"); draw(); }));
    $("zoomIn").addEventListener("click", () => zoom(0.6)); $("zoomOut").addEventListener("click", () => zoom(1.7)); $("resetZoom").addEventListener("click", resetViewport);
    $("canvasWrap").addEventListener("wheel", (event) => { event.preventDefault(); if (!chartGeometry) return; const rect = $("canvasWrap").getBoundingClientRect(), ratio = Math.max(0, Math.min(1, (event.clientX - rect.left - chartGeometry.area.l) / (chartGeometry.area.r - chartGeometry.area.l))); zoom(event.deltaY < 0 ? 0.75 : 1.33, ratio); }, { passive: false });
    $("canvasWrap").addEventListener("mousedown", (event) => { if (!chartGeometry || event.button !== 0) return; dragging = { x: event.clientX, delta: 0, duration: chartGeometry.last - chartGeometry.first, end: chartGeometry.last }; hover = null; $("tooltip").style.display = "none"; $("canvasWrap").classList.add("dragging"); draw(); });
    window.addEventListener("mouseup", async () => { if (!dragging || !chartGeometry) return; const drag = dragging; dragging = null; $("canvasWrap").classList.remove("dragging"); if (Math.abs(drag.delta) < 3) return; const width = chartGeometry.area.r - chartGeometry.area.l; const shiftMs = -drag.delta / width * drag.duration; const now = Date.now(); const nextEnd = Math.min(now, drag.end + shiftMs); viewDurationMs = drag.duration; windowEndMs = nextEnd >= now - 2000 ? null : nextEnd; syncRangeButtons(); await refresh(); });
    $("canvasWrap").addEventListener("mousemove", (event) => { const rect = $("canvasWrap").getBoundingClientRect(), mx = event.clientX - rect.left, my = event.clientY - rect.top; if (dragging) { dragging.delta = event.clientX - dragging.x; return; } if (!chartGeometry || mx < chartGeometry.area.l || mx > chartGeometry.area.r || my < chartGeometry.area.t || my > chartGeometry.area.b) { hover = null; $("tooltip").style.display = "none"; draw(); return; } hover = { x: mx, y: my }; draw(); if (!hoverPoints.length) return; const nearest = hoverPoints.reduce((a, b) => Math.abs(b.x - mx) < Math.abs(a.x - mx) ? b : a).point; const lines = [`<strong>${dateTime(nearest.timestampMs)} UTC+8</strong>`, `<span>横线 Edge ${edge(chartGeometry.edgeAtY(my))}</span>`]; if (seriesMode !== "short") lines.push(`<span class="long">做多价差 ${edge(nearest.longEdge)}</span>`); if (seriesMode !== "long") lines.push(`<span class="short">做空价差 ${edge(nearest.shortEdge)}</span>`); const tip = $("tooltip"); tip.innerHTML = lines.join("<br>"); tip.style.display = "block"; tip.style.left = `${Math.min(rect.width - 190, Math.max(8, mx + 12))}px`; tip.style.top = `${Math.min(rect.height - tip.offsetHeight - 8, Math.max(8, my - 20))}px`; });
    $("canvasWrap").addEventListener("dblclick", resetViewport);
    $("canvasWrap").addEventListener("mouseleave", () => { hover = null; $("tooltip").style.display = "none"; draw(); });
    window.addEventListener("resize", draw);
    async function refreshLoop() {
      await loadAssets();
      await refresh();
      setTimeout(refreshLoop, 5000);
    }
    void refreshLoop();
  </script>
